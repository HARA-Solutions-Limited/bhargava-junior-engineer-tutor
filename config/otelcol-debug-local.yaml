# Local-only collector config — used when Elastic OTLP credentials are missing or invalid.
# Traces/metrics/logs stay in the collector debug exporter (docker logs otel-collector).
exporters:
  debug:

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:${env:OTEL_COLLECTOR_PORT_GRPC}
      http:
        endpoint: 0.0.0.0:${env:OTEL_COLLECTOR_PORT_HTTP}
        cors:
          allowed_origins:
            - "http://*"
            - "https://*"
  httpcheck/frontendproxy:
    targets:
      - endpoint: http://frontendproxy:${env:ENVOY_PORT}
  hostmetrics:
    collection_interval: 10s
    root_path: /hostfs
    scrapers:
      cpu:
        metrics:
          system.cpu.utilization:
            enabled: true
      memory:
        metrics:
          system.memory.utilization:
            enabled: true
      network: {}
      load: {}
      disk: {}

processors:
  batch:
  transform/sanitize_spans:
    error_mode: ignore
    trace_statements:
      - context: span
        statements:
          - set(span.name, Concat([span.attributes["http.method"], " ", span.attributes["http.route"]], "")) where
            span.attributes["http.route"] != nil and
            span.attributes["http.method"] != nil

service:
  pipelines:
    logs:
      exporters:
        - debug
      processors:
        - batch
      receivers:
        - otlp
    metrics/infra/otel:
      exporters:
        - debug
      processors:
        - batch
      receivers:
        - hostmetrics
    metrics:
      exporters:
        - debug
      processors:
        - batch
      receivers:
        - httpcheck/frontendproxy
        - otlp
    traces:
      exporters:
        - debug
      processors:
        - transform/sanitize_spans
        - batch
      receivers:
        - otlp
